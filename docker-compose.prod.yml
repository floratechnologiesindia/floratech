# =============================================================================
# PRODUCTION ONLY — optimized builds, no source bind mounts, public HTTPS URLs
# Command: docker compose -f docker-compose.prod.yml up --build -d
# Host nginx: see nginx.conf.example (www → :5050, api → :5000, admin → :4174)
# Do NOT mix with docker-compose.yml for the same project name if you need clean separation.
# =============================================================================

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - TRUST_PROXY=1
      - MONGODB_URI=mongodb://mongo:27017/flora_tech
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://www.floratechnologies.in,https://floratechnologies.in,https://admin.floratechnologies.in}
    ports:
      - '5000:4000'
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NODE_ENV=production
      - API_URL=http://backend:4000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.floratechnologies.in}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://www.floratechnologies.in}
    ports:
      - '5050:3000'
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.floratechnologies.in/api}
    ports:
      - '4174:4174'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
