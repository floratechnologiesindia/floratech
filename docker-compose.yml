# =============================================================================
# DEVELOPMENT ONLY — hot reload, bind mounts, dev servers, localhost URLs
# Command: docker compose up --build
# Do NOT use this file for production. Use: docker-compose.prod.yml
# =============================================================================

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/flora_tech
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5174,http://127.0.0.1:5174
    ports:
      - '4000:4000'
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ['npm', 'run', 'dev']

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ['npm', 'run', 'dev', '--', '--hostname', '0.0.0.0']

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    environment:
      - VITE_API_URL=http://localhost:4000/api
    ports:
      - '5174:5174'
    volumes:
      - ./admin:/app
      - /app/node_modules
    command: ['npm', 'run', 'dev', '--', '--host', '0.0.0.0', '--port', '5174']

volumes:
  mongo_data:
